<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Charge Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Charge Calculator</h1>

        <!-- Method Selection -->
        <div class="section">
            <label><input type="radio" name="method" value="curve" checked onchange="toggleMethod()"> Use charging curve</label>
            <label><input type="radio" name="method" value="manual" onchange="toggleMethod()"> Enter average charging speed</label>
        </div>

        <!-- Battery Information -->
        <h2>Battery Information</h2>
        <div class="grid-3">
            <div class="input-group">
                <label>Start SoC (%)</label>
                <input type="number" id="startSoC" value="20" oninput="calculate()"/>
            </div>
            <div class="input-group">
                <label>End SoC (%)</label>
                <input type="number" id="endSoC" value="80" oninput="calculate()"/>
            </div>
            <div class="input-group">
                <label>Battery Capacity (kWh)</label>
                <input type="number" id="batteryCapacity" value="66.5" oninput="calculate()"/>
            </div>
        </div>

        <!-- Charging Curve Section -->
        <div id="curveSection">
            <h2>Charger Information</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>Charger Power (kW)</label>
                    <input type="number" id="chargerPower" value="150" oninput="calculate()"/>
                </div>
                <div class="input-group">
                    <label>Price per minute (€)</label>
                    <input type="number" id="priceMinCurve" value="0.931" step="0.001" oninput="calculate()"/>
                </div>
            </div>
            <h2>Charging Curve</h2>
            <canvas id="chargingCurveChart"></canvas>
        </div>

        <!-- Manual Section -->
        <div id="manualSection" style="display:none;">
            <h2>Manual Speed</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>Average Charging Speed (kW)</label>
                    <input type="number" id="avgSpeedManual" value="150" oninput="calculate()"/>
                </div>
                <div class="input-group">
                    <label>Price per minute (€)</label>
                    <input type="number" id="priceMinManual" value="0.931" step="0.001" oninput="calculate()"/>
                </div>
            </div>
        </div>

        <!-- Results -->
        <h2>Results</h2>
        <div class="grid-4">
            <div class="result-box">
                <p class="result-label">Avg. Charging Speed</p>
                <p class="result-value" id="resAvgSpeed">-</p>
            </div>
            <div class="result-box">
                <p class="result-label">Delta SoC</p>
                <p class="result-value" id="resDeltaSoC">-</p>
            </div>
            <div class="result-box">
                <p class="result-label">Est. Charging Time</p>
                <p class="result-value" id="resTime">-</p>
            </div>
            <div class="result-box">
                <p class="result-label">Est. Charging Cost</p>
                <p class="result-value" id="resCost">-</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

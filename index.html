<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>stlite app</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.7.1/build/stlite.css"
    />
    <style>
      footer {        
        visibility: hidden;
      }
      footer:after {
        content:'Based on github.com/FredHutch/stlite-template'; 
        visibility: visible;
        display: block;
        position: relative;
        padding: 5px;
        top: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.7.1/build/stlite.js"></script>
    <script>
        Promise.all([
            fetch("app.py").then((response) => response.text()),
            fetch("chargingCurves/Tesla_M3_Pannasonic3.csv").then((response) => response.text()),
        ]).then(([app, csv]) =>
            stlite.mount(
                {
                    requirements: ["pandas", "streamlit"],
                    entrypoint: "app.py",
                    files: {
                        "app.py": app,
                        "chargingCurves/Tesla_M3_Pannasonic3.csv": csv,
                    },
                },
                document.getElementById("root")
            )
        );
    </script>
  </body>
</html>
